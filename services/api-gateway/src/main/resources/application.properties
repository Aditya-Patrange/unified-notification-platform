spring.application.name=api-gateway
server.port=9090

spring.cloud.gateway.server.webflux.routes[0].id=auth-service
spring.cloud.gateway.server.webflux.routes[0].uri=http://localhost:9091
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/api/auth/**

spring.cloud.gateway.server.webflux.routes[1].id=notification-service
spring.cloud.gateway.server.webflux.routes[1].uri=http://localhost:9093
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/api/notifications/**

jwt.secret=mysupersecretkeymysupersecretkey
jwt.expiration=3600000